[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
linker = "ld.lld"
rustflags = [
    "-C", "code-model=kernel",
    "-C", "relocation-model=static",
    "-C", "link-arg=-Tkernel/linker.ld",
]

[target.x86_64-unknown-oxide]
rustflags = [
    "-C", "relocation-model=static",
]

[target.x86_64-unknown-oxide-user]
linker = "ld.lld"
rustflags = [
    "-C", "relocation-model=static",
]

[target.x86_64-unknown-uefi]
runner = "cargo run --manifest-path tools/uefi-run/Cargo.toml --"
