[package]
name = "vt"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Virtual terminal (VT) support for OXIDE OS"

[features]
default = []
debug-console = []  # Enable VT read/write path tracing

[dependencies]
vfs = { workspace = true }
tty = { workspace = true }
signal = { workspace = true }
os_core = { workspace = true }
os_log = { workspace = true }
sched = { workspace = true }
spin = { workspace = true }
terminal = { path = "../terminal" }
