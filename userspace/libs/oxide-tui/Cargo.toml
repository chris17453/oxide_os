[package]
name = "oxide-tui"
version = "6.0.0"
edition = "2024"
description = "Terminal User Interface library for OXIDE OS - ncurses-compatible API"

[features]
default = ["wide", "color", "mouse", "menu", "form", "panel"]
std = ["termcap/std"]  # Enable std (for host-side testing)
wide = []       # Wide character support
color = []      # Color support
mouse = []      # Mouse event handling
menu = []       # Menu library
form = []       # Form library
panel = []      # Panel library

[dependencies]
termcap = { path = "../termcap", default-features = false }
vte = { path = "../vte" }
libc = { path = "../libc" }

[lib]
crate-type = ["rlib"]
