[workspace]
resolver = "2"

members = [
    "kernel",
    "crates/core/efflux-core",
    "crates/core/efflux-log",
    "crates/arch/efflux-arch-traits",
    "crates/arch/efflux-arch-x86_64",
    "crates/mm/efflux-mm-traits",
    "crates/mm/efflux-mm-frame",
    "crates/mm/efflux-mm-paging",
    "crates/mm/efflux-mm-heap",
    "crates/mm/efflux-mm-cow",
    "crates/sched/efflux-sched-traits",
    "crates/sched/efflux-sched",
    "crates/proc/efflux-proc-traits",
    "crates/proc/efflux-proc",
    "crates/exec/efflux-elf",
    "crates/syscall/efflux-syscall",
    "crates/boot/efflux-boot-proto",
    "crates/drivers/efflux-driver-traits",
    "crates/drivers/serial/efflux-driver-uart-8250",
    "crates/vfs/efflux-vfs",
    "crates/vfs/efflux-devfs",
    "crates/vfs/efflux-tmpfs",
    "crates/vfs/efflux-initramfs",
    "crates/vfs/efflux-procfs",
    "crates/tty/efflux-tty",
    "crates/tty/efflux-pty",
    "crates/signal/efflux-signal",
    "crates/smp/efflux-smp",
    "userspace/efflux-libc",
    "userspace/init",
    "userspace/shell",
    "userspace/coreutils",
    "bootloader/efflux-boot-uefi",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/user/efflux"

[workspace.dependencies]
bitflags = "2.4"
spin = "0.9"
log = { version = "0.4", default-features = false }

# Internal crates
efflux-core = { path = "crates/core/efflux-core" }
efflux-log = { path = "crates/core/efflux-log" }
efflux-arch-traits = { path = "crates/arch/efflux-arch-traits" }
efflux-arch-x86_64 = { path = "crates/arch/efflux-arch-x86_64" }
efflux-mm-traits = { path = "crates/mm/efflux-mm-traits" }
efflux-mm-frame = { path = "crates/mm/efflux-mm-frame" }
efflux-mm-paging = { path = "crates/mm/efflux-mm-paging" }
efflux-mm-heap = { path = "crates/mm/efflux-mm-heap" }
efflux-mm-cow = { path = "crates/mm/efflux-mm-cow" }
efflux-sched-traits = { path = "crates/sched/efflux-sched-traits" }
efflux-sched = { path = "crates/sched/efflux-sched" }
efflux-proc-traits = { path = "crates/proc/efflux-proc-traits" }
efflux-proc = { path = "crates/proc/efflux-proc" }
efflux-elf = { path = "crates/exec/efflux-elf" }
efflux-syscall = { path = "crates/syscall/efflux-syscall" }
efflux-boot-proto = { path = "crates/boot/efflux-boot-proto" }
efflux-driver-traits = { path = "crates/drivers/efflux-driver-traits" }
efflux-vfs = { path = "crates/vfs/efflux-vfs" }
efflux-devfs = { path = "crates/vfs/efflux-devfs" }
efflux-tmpfs = { path = "crates/vfs/efflux-tmpfs" }
efflux-initramfs = { path = "crates/vfs/efflux-initramfs" }
efflux-procfs = { path = "crates/vfs/efflux-procfs" }
efflux-tty = { path = "crates/tty/efflux-tty" }
efflux-pty = { path = "crates/tty/efflux-pty" }
efflux-signal = { path = "crates/signal/efflux-signal" }
efflux-smp = { path = "crates/smp/efflux-smp" }

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
