[package]
name = "ps2"
version = "0.1.0"
edition = "2024"

[features]
debug-input = []

[dependencies]
input = { path = "../../../input/input" }
# — SableWire: driver-traits has ZERO deps, breaking the circular chain
# (ps2 → driver-core → pci → arch-x86_64 → ps2 was the old curse)
driver-traits = { workspace = true }
spin = "0.9"
