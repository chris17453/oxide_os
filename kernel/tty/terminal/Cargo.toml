[package]
name = "terminal"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
debug-lock = []  # Emit serial warnings on lock contention in ISR context
debug-tty-read = []  # Enable terminal query/response debug output
debug-terminal = []  # Enable terminal escape sequence debug output

[dependencies]
bitflags.workspace = true
spin.workspace = true
fb = { path = "../../graphics/fb" }
os_log = { path = "../../core/os_log" }
vte = { path = "../../../libs/vte" }
