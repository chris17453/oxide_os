[package]
name = "termcap"
version = "0.1.0"
edition = "2024"
description = "Terminal capability library for OXIDE OS - full termcap/terminfo implementation"

[features]
default = ["std", "terminfo"]
std = []       # Enable std (for testing)
terminfo = []  # Binary terminfo format support
termcap = []   # Text termcap format support

[dependencies]

[lib]
crate-type = ["rlib", "staticlib"]
