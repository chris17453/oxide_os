# Build Configuration for OXIDE Package Manager

[build_defaults]
# Default build system detection order
build_systems=autotools,cmake,meson,make,python

# Autotools detection
autotools_files=configure,configure.ac,configure.in

# CMake detection
cmake_files=CMakeLists.txt

# Meson detection
meson_files=meson.build

# Python detection
python_files=setup.py,pyproject.toml

[autotools]
# Standard configure options
configure_opts=--prefix=/usr --sysconfdir=/etc --localstatedir=/var --host=x86_64-oxide

# Additional common flags
enable_shared=no
enable_static=yes
disable_nls=yes

[cmake]
# CMake generator
generator=Unix Makefiles

# Standard options
options=-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_SHARED_LIBS=OFF

# Toolchain file
toolchain_file=%(toolchain_path)s/cmake/oxide-toolchain.cmake

[meson]
# Cross-compilation file
cross_file=%(toolchain_path)s/meson/oxide-cross.txt

# Standard options
options=--prefix=/usr --sysconfdir=/etc --buildtype=release

[make]
# Make flags
make_opts=-j%(make_jobs)s

# Install prefix
install_prefix=/usr

[python]
# Python build backend
build_backend=setuptools

# Install options
install_opts=--prefix=/usr --root=%(install_root)s

[patches]
# Patch directory
patch_dir=%(pkgmgr_root)s/patches

# Auto-apply OXIDE patches
auto_apply=1

# Patch level (strip count)
patch_level=1

[package]
# Package compression (none, gzip, bzip2, xz, zstd)
compression=xz

# Compression level (1-9)
compression_level=6

# Include debug symbols in separate package
split_debug=0

# Strip binaries
strip=1

# Package format version
format_version=1.0
