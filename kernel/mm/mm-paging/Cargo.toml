[package]
name = "mm-paging"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
debug-demand = []  # Enable debug output for demand paging/page faults
debug-paging = []  # Enable page table mapping traces (PT-CLEAR/PT-ENTRY/PTE-WRITE — EXTREMELY noisy, fires on every map call)

[dependencies]
