[package]
name = "proc"
version = "0.1.0"
edition = "2024"

[features]
debug-fork = []
debug-paging = ["mm-paging/debug-paging"]  # Enable page alloc/zero traces during exec (EXTREMELY noisy — fires on every page)
debug-proc = []  # Enable process lifecycle debug traces (frame alloc/free, Drop paths)
debug-vma = ["mm-vma/debug-vma"]  # Enable VMA insert/remove traces

[dependencies]
os_core = { path = "../../core/os_core" }
os_log = { path = "../../core/os_log" }
proc-traits = { path = "../proc-traits" }
mm-paging = { path = "../../mm/mm-paging" }
mm-vma = { path = "../../mm/mm-vma" }
mm-traits = { path = "../../mm/mm-traits" }
mm-cow = { path = "../../mm/mm-cow" }
mm-manager = { path = "../../mm/mm-manager" }
elf = { path = "../../exec/elf" }
sched-traits = { path = "../../sched/sched-traits" }
vfs = { path = "../../vfs/vfs" }
signal = { path = "../../signal/signal" }
smp = { path = "../../smp/smp" }
spin = "0.9"
arch-x86_64 = { path = "../../arch/arch-x86_64" }
