[main]
# Cache directory for downloaded packages and metadata
cachedir=%(pkgmgr_root)s/cache

# Keep cache after successful install (0=no, 1=yes)
keepcache=0

# Logging level (0-10, higher is more verbose)
debuglevel=2

# Install root directory
installroot=/

# Plugins directory
pluginpath=%(pkgmgr_root)s/plugins

# Repository metadata expiration time (seconds)
metadata_expire=86400

[oxide]
# Path to OXIDE toolchain
toolchain_path=%(repo_root)s/toolchain

# Target architecture
target_arch=x86_64-oxide

# Number of parallel make jobs
make_jobs=4

# Sysroot path for cross-compilation
sysroot=%(toolchain_path)s/sysroot

# Build output directory
build_dir=%(pkgmgr_root)s/cache/builds

# Package repository directory
repo_dir=%(pkgmgr_root)s/repo

# SRPM cache directory
srpm_cache=%(pkgmgr_root)s/cache/srpms

# Extraction directory
extract_dir=%(pkgmgr_root)s/cache/extracted

# Compiler flags
cflags=-O2 -fPIC -D__OXIDE__

# Linker flags
ldflags=-static

# PKG_CONFIG settings
pkg_config_path=%(sysroot)s/lib/pkgconfig

# Build log directory
log_dir=%(pkgmgr_root)s/logs

# Maximum build time (seconds, 0=unlimited)
build_timeout=3600

# Clean build directory after success
clean_after_build=1

[build]
# Autotools configure flags
configure_flags=--prefix=/usr --sysconfdir=/etc --localstatedir=/var

# CMake flags
cmake_flags=-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

# Meson flags
meson_flags=--prefix=/usr --sysconfdir=/etc --localstatedir=/var

# Enable ccache if available
use_ccache=1

# Build with debug symbols
debug_symbols=0

# Strip binaries after build
strip_binaries=1

[network]
# Download timeout (seconds)
timeout=300

# Number of retries
retries=3

# Maximum download speed (bytes/sec, 0=unlimited)
throttle=0

# User agent string
user_agent=oxdnf/1.0 (OXIDE OS)

# Proxy settings (http://proxy:port)
# proxy=

[security]
# Check GPG signatures (0=no, 1=yes)
gpgcheck=0

# GPG key directory
gpgkey_dir=%(pkgmgr_root)s/gpgkeys

# Require valid signatures
repo_gpgcheck=0

[database]
# Package database format (sqlite, json)
db_format=json

# Database file
db_file=%(repo_dir)s/metadata/packages.db

# Installed packages database
installed_db=/var/lib/oxdnf/installed.db
